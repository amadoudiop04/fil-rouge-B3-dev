# Lance toute la stack : MySQL + API Node + front Vite
# Usage :  docker compose up --build
# Puis ouvre http://localhost:5173
#
# Les variables (mots de passe, tokens) sont lues depuis le fichier .env
# à la racine (copie .env.example -> .env et remplis-le).

services:
  mysql:
    image: mysql:8.0
    container_name: b3-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-b3_esport}
    ports:
      - "3306:3306"
    volumes:
      - b3-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: b3-api
    restart: unless-stopped
    command: node server/local-api.mjs
    environment:
      API_PORT: 3001
      DB_HOST: mysql            # nom du service MySQL ci-dessus
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-b3_esport}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_REGION: ${RIOT_REGION:-eu}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build: .
    container_name: b3-web
    restart: unless-stopped
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_PANDASCORE_TOKEN: ${VITE_PANDASCORE_TOKEN:-}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  b3-db-data:
